<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>AI-тренер · Тренировочный план</title>
  <link rel="icon" type="image/webp" href="assets/might_guy.webp">
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f3f4f1;--surface:#fff;--surface2:#f8f8f6;--text:#171816;--muted:#696d66;
      --line:#dfe2dc;--accent:#26734d;--accent2:#e1f1e8;--warm:#9a5a13;--warmbg:#fff1dc;
      --shadow:0 10px 30px rgba(25,32,27,.07);--radius:18px
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#111512;--surface:#181d19;--surface2:#202621;--text:#edf2ed;--muted:#a5ada6;
        --line:#333b35;--accent:#6ed29a;--accent2:#183826;--warm:#ffc273;--warmbg:#3d2b16;
        --shadow:0 12px 36px rgba(0,0,0,.24)
      }
    }
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button{font:inherit}
    .shell{width:min(1040px,100%);margin:auto;padding:28px 18px 72px}
    .controls{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(14px);padding:10px 0 12px;margin-bottom:12px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .back{color:var(--muted);text-decoration:none;font-weight:650}
    .back:hover{color:var(--text)}
    .plan-nav{display:flex;align-items:center;gap:8px}
    .nav-button{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:12px;padding:10px 13px;cursor:pointer}
    .nav-button:disabled{opacity:.35;cursor:not-allowed}
    .plan-label{font-size:13px;font-weight:800;min-width:92px;text-align:center}
    .workout-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:10px}
    .mode-switch,.session-links{display:flex;gap:6px}
    .tool-button{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:12px;font-weight:760}
    .tool-button:hover{color:var(--text)}
    .tool-button.active{background:var(--accent2);border-color:color-mix(in srgb,var(--accent) 42%,var(--line));color:var(--accent)}
    .sessions{display:grid;gap:14px}
    details.session{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:130px}
    details.session[open]{border-color:color-mix(in srgb,var(--accent) 32%,var(--line))}
    summary{list-style:none;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:18px;cursor:pointer}
    summary::-webkit-details-marker{display:none}
    .sequence{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;background:var(--surface2);font-weight:850;font-size:18px}
    .session-title{font-size:17px;font-weight:820;letter-spacing:-.01em}
    .session-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .badge{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;background:var(--accent2);color:var(--accent)}
    .badge.completed{background:var(--accent2)}
    .badge.skipped,.badge.cancelled{background:var(--warmbg);color:var(--warm)}
    .session-body{border-top:1px solid var(--line);padding:5px 18px 18px}
    .exercise{display:grid;grid-template-columns:minmax(190px,1.2fr) minmax(240px,2fr) auto;gap:14px;padding:15px 0;border-bottom:1px solid var(--line);align-items:center}
    .exercise:last-child{border-bottom:0}
    .exercise-name{font-weight:780}
    .tech{font-size:11px;color:var(--muted);margin-top:4px}
    .working{font-size:15px;font-weight:760}
    .warmup{font-size:11px;color:var(--muted);margin-top:4px}
    .params{text-align:right;font-size:12px;color:var(--muted);white-space:nowrap}
    .actual{margin-top:9px;padding:9px 11px;border-radius:10px;background:var(--accent2);font-size:12px}
    .error{padding:18px;border-radius:14px;background:var(--warmbg);color:var(--warm)}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    @media(max-width:720px){
      .shell{padding:20px 12px 48px}
      .workout-toolbar{align-items:flex-start;flex-direction:column}
      .session-links{width:100%;display:grid;grid-template-columns:repeat(4,1fr)}
      .session-links .tool-button{padding-inline:4px}
      .exercise{grid-template-columns:1fr}
      .params{text-align:left}
      summary{grid-template-columns:auto 1fr}.badge{grid-column:2;justify-self:start}
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="controls">
      <div class="topbar">
        <a class="back" href="index.html">← Все программы</a>
        <nav class="plan-nav" aria-label="Навигация по планам">
          <button class="nav-button" id="previous-plan" type="button" aria-label="Предыдущий план">←</button>
          <span class="plan-label" id="plan-label">План —</span>
          <button class="nav-button" id="next-plan" type="button" aria-label="Следующий план">→</button>
        </nav>
      </div>
      <div class="workout-toolbar">
        <div class="mode-switch" aria-label="Режим отображения">
          <button class="tool-button active" type="button" data-mode="all">Все</button>
          <button class="tool-button" type="button" data-mode="single">По одной</button>
        </div>
        <nav class="session-links" id="session-links" aria-label="Быстрый переход к тренировке"></nav>
      </div>
    </div>

    <section id="content" class="loading">Загружаю план…</section>
  </main>

  <script>
    (() => {
      "use strict";

      const requestedAthlete = new URLSearchParams(window.location.search).get("athlete");
      const athlete = requestedAthlete === "women" ? "women" : "man";
      const state = { athlete, index: null, plans: [], current: 0, mode: "all", currentSession: 0 };
      const $ = id => document.getElementById(id);
      const escapeHtml = value => String(value ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      const number = value => String(value).replace(".", ",");
      const statusLabel = {
        planned: "Запланировано", active: "Активный", completed: "Выполнено",
        skipped: "Пропущено", cancelled: "Отменено", superseded: "Заменён"
      };

      function applyUrlState() {
        const params = new URLSearchParams(window.location.search);
        const planId = params.get("plan");
        const planIndex = state.plans.findIndex(plan => plan.planId === planId);
        if (planIndex >= 0) state.current = planIndex;

        const view = params.get("view");
        state.mode = view === "single" ? "single" : "all";

        const plan = state.plans[state.current];
        const sessionId = params.get("session");
        const sessionIndex = plan.sessions.findIndex(session => session.sessionId === sessionId);
        state.currentSession = sessionIndex >= 0 ? sessionIndex : 0;
      }

      function syncUrl(push = true) {
        const plan = state.plans[state.current];
        if (!plan) return;
        const url = new URL(window.location.href);
        url.searchParams.set("athlete", state.athlete);
        url.searchParams.set("plan", plan.planId);
        url.searchParams.set("view", state.mode);
        url.searchParams.set("session", plan.sessions[state.currentSession].sessionId);
        window.history[push ? "pushState" : "replaceState"]({}, "", url);
      }

      function scrollToCurrentSession() {
        if (state.mode !== "all") {
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
        const plan = state.plans[state.current];
        const session = plan?.sessions[state.currentSession];
        if (!session) return;
        document.getElementById(`session-${session.sessionId}`)
          ?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function formatBlock(block) {
        if (block.durationSeconds) {
          return `${block.durationSeconds} сек × ${block.sets}`;
        }
        const unit = block.unit === "kg_per_hand" ? " кг/рука" :
          block.unit === "kg_per_side" ? " кг/сторона" :
          block.unit === "bodyweight" ? " · свой вес" : " кг";
        return `${number(block.weight)}${unit} × ${block.reps} × ${block.sets}`;
      }

      function formatBlocks(blocks) {
        return (blocks || []).map(formatBlock).join("; ");
      }

      function renderExercise(exercise) {
        const warmup = formatBlocks(exercise.warmupBlocks);
        const actual = exercise.actual
          ? `<div class="actual"><b>Факт:</b> ${escapeHtml(formatBlocks(exercise.actual))}</div>` : "";
        return `
          <div class="exercise">
            <div>
              <div class="exercise-name">${exercise.order}. ${escapeHtml(exercise.name)}</div>
              ${exercise.technicalNote ? `<div class="tech">${escapeHtml(exercise.technicalNote)}</div>` : ""}
            </div>
            <div>
              <div class="working">${escapeHtml(formatBlocks(exercise.loadBlocks))}</div>
              ${warmup ? `<div class="warmup">Разминка: ${escapeHtml(warmup)}</div>` : ""}
              ${actual}
            </div>
            <div class="params">Отдых ${Math.round(exercise.restSeconds / 60 * 10) / 10} мин<br>ожидаемый RIR ${exercise.expectedRir}</div>
          </div>`;
      }

      function renderSession(session, index) {
        const interval = session.recommendedIntervalAfterPreviousHours
          ? `через ${session.recommendedIntervalAfterPreviousHours} ч после предыдущей`
          : "первая тренировка плана";
        return `
          <details class="session" id="session-${escapeHtml(session.sessionId)}" open>
            <summary>
              <span class="sequence">${session.sequence}</span>
              <span>
                <span class="session-title">${escapeHtml(session.focus)}</span>
                <span class="session-meta">Тренировка ${escapeHtml(session.sessionId)} · ~${session.estimatedDurationMinutes} мин · ${interval}</span>
              </span>
              <span class="badge ${session.status}">${statusLabel[session.status] || session.status}</span>
            </summary>
            <div class="session-body">
              ${session.prescribed.exercises.map(renderExercise).join("")}
            </div>
          </details>`;
      }

      function renderPlan() {
        const plan = state.plans[state.current];
        if (!plan) return;
        if (state.currentSession >= plan.sessions.length) state.currentSession = 0;
        $("plan-label").textContent = `План ${plan.planId}`;
        $("previous-plan").disabled = state.current === 0;
        $("next-plan").disabled = state.current === state.plans.length - 1;
        $("session-links").innerHTML = plan.sessions.map((session, index) => `
          <button class="tool-button ${index === state.currentSession ? "active" : ""}"
            type="button" data-session-index="${index}"
            aria-label="Тренировка ${escapeHtml(session.sessionId)}"
            title="${escapeHtml(session.focus)}">S${String(session.sequence).padStart(2, "0")}</button>
        `).join("");
        document.querySelectorAll("[data-mode]").forEach(button => {
          button.classList.toggle("active", button.dataset.mode === state.mode);
        });
        const visibleSessions = state.mode === "single"
          ? [plan.sessions[state.currentSession]]
          : plan.sessions;
        $("content").className = "";
        $("content").innerHTML = `
          <div class="sessions">${visibleSessions.map(renderSession).join("")}</div>`;
      }

      async function load() {
        try {
          document.title = state.athlete === "women"
            ? "AI-тренер · Женский план"
            : "AI-тренер · Мужской план";
          const indexResponse = await fetch(`log/${state.athlete}/index.json`, { cache: "no-store" });
          if (!indexResponse.ok) throw new Error(`index.json: HTTP ${indexResponse.status}`);
          state.index = await indexResponse.json();
          const records = state.index.plans;
          state.plans = await Promise.all(records.map(async record => {
            const response = await fetch(`log/${state.athlete}/${record.file}`, { cache: "no-store" });
            if (!response.ok) throw new Error(`${record.file}: HTTP ${response.status}`);
            return response.json();
          }));
          const active = state.plans.findIndex(plan => plan.planId === state.index.activePlanId);
          state.current = active >= 0 ? active : Math.max(0, state.plans.length - 1);
          applyUrlState();
          renderPlan();
          syncUrl(false);
          if (new URLSearchParams(window.location.search).has("session")) {
            requestAnimationFrame(scrollToCurrentSession);
          }
        } catch (error) {
          $("content").className = "error";
          $("content").innerHTML = `<b>Не удалось загрузить планы.</b><br>${escapeHtml(error.message)}<br><small>Открывайте страницу через сайт или локальный HTTP-сервер, не через file://.</small>`;
        }
      }

      $("previous-plan").addEventListener("click", () => {
        if (state.current > 0) {
          state.current -= 1; state.currentSession = 0; renderPlan();
          syncUrl();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
      $("next-plan").addEventListener("click", () => {
        if (state.current < state.plans.length - 1) {
          state.current += 1; state.currentSession = 0; renderPlan();
          syncUrl();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
      document.querySelector(".mode-switch").addEventListener("click", event => {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        state.mode = button.dataset.mode;
        renderPlan();
        syncUrl();
        scrollToCurrentSession();
      });
      $("session-links").addEventListener("click", event => {
        const button = event.target.closest("[data-session-index]");
        if (!button) return;
        state.currentSession = Number(button.dataset.sessionIndex);
        renderPlan();
        syncUrl();
        scrollToCurrentSession();
      });
      window.addEventListener("popstate", () => {
        applyUrlState();
        renderPlan();
        requestAnimationFrame(scrollToCurrentSession);
      });

      load();
    })();
  </script>
</body>
</html>
