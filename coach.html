<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>AI-тренер · Тренировочный план</title>
  <link rel="icon" type="image/webp" href="assets/might_guy.webp">
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f1f4ef;--surface:#ffffff;--surface2:#f4f7f2;
      --ink:#15211a;--muted:#69726b;--line:#e3e7e0;
      --accent:#1c7a4b;--accent-ink:#12613b;--accent-soft:#e2f1e9;
      --rir:#b26a10;--rir-soft:#faedd6;
      --radius:16px;--shadow:0 8px 26px rgba(19,40,28,.07)
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f1512;--surface:#161c18;--surface2:#1c231e;
        --ink:#eaf1eb;--muted:#9aa39c;--line:#2c342e;
        --accent:#5fce93;--accent-ink:#8ee0b1;--accent-soft:#173225;
        --rir:#f2b866;--rir-soft:#3a2c14;
        --shadow:0 14px 40px rgba(0,0,0,.3)
      }
    }
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
    button{font:inherit}
    .shell{width:min(920px,100%);margin:auto;padding:24px 18px 72px}

    .controls{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(14px);padding:12px 0;margin-bottom:14px}
    .mini-bar{display:none;align-items:center;gap:12px}
    .mini-bar .back{flex:none;font-size:20px;font-weight:700}
    .mini-title{flex:1;min-width:0;font-size:13px;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .menu-toggle{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:760;cursor:pointer}
    .menu-toggle:hover{border-color:var(--accent)}
    .mini-bar .today{flex:none;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:800;cursor:pointer}
    .mini-bar .today:disabled{opacity:.4;cursor:not-allowed}
    @media(max-width:720px){
      .mini-bar{display:flex}
      .menu-panel{display:none}
      .menu-panel.open{display:block;padding-top:12px}
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .back{color:var(--muted);text-decoration:none;font-weight:650;font-size:14px}
    .back:hover{color:var(--ink)}
    .links{display:flex;align-items:center;gap:14px}
    .report-link{color:var(--accent-ink);text-decoration:none;font-weight:760;font-size:14px}
    .report-link:hover{text-decoration:underline}
    .plan-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-button{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:11px;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;transition:border-color .12s,background .12s}
    .nav-button:hover:not(:disabled){border-color:var(--accent)}
    .nav-button:disabled{opacity:.35;cursor:not-allowed}
    .today-button{width:auto;padding:0 15px;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:800}
    .plan-label{font-size:13px;font-weight:800;min-width:86px;text-align:center;letter-spacing:.02em}
    .workout-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
    .mode-switch{display:flex;gap:4px;background:var(--surface2);padding:3px;border-radius:11px;border:1px solid var(--line)}
    .mode-switch .tool-button{border:0;background:transparent;color:var(--muted)}
    .mode-switch .tool-button.active{background:var(--surface);box-shadow:var(--shadow);color:var(--ink)}
    .session-links{display:flex;gap:6px}
    .tool-button{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;padding:8px 11px;cursor:pointer;font-size:12px;font-weight:760;transition:all .12s}
    .tool-button:hover{color:var(--ink)}
    .session-links .st-done{background:var(--accent-soft);border-color:transparent;color:var(--accent-ink)}
    .session-links .st-current{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:840}
    .session-links .tool-button.selected{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--rir)}

    .sessions{display:grid;gap:14px}
    details.session{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:140px}
    details.session[open]{border-color:color-mix(in srgb,var(--accent) 30%,var(--line))}
    summary{list-style:none;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:16px 18px;cursor:pointer}
    summary::-webkit-details-marker{display:none}
    .sequence{display:grid;place-items:center;width:46px;height:46px;border-radius:14px;font-weight:850;font-size:19px;border:1px solid transparent}
    .sequence.completed{background:var(--accent-soft);color:var(--accent-ink)}
    .sequence.current{background:var(--accent);color:#fff}
    .sequence.planned{background:var(--surface);border-color:var(--line);color:var(--muted)}
    .session-title{display:block;font-size:16px;font-weight:820;letter-spacing:-.01em}
    .session-meta{display:block;font-size:12px;color:var(--muted);margin-top:3px}
    .badge{padding:5px 11px;border-radius:999px;font-size:11px;font-weight:820;letter-spacing:.02em;white-space:nowrap}
    .badge.completed{background:var(--accent-soft);color:var(--accent-ink)}
    .badge.current{background:var(--accent);color:#fff}
    .badge.planned{background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
    .session-body{border-top:1px solid var(--line);padding:6px 18px 14px}
    .session-note{margin:12px 0 6px;padding:11px 14px;background:var(--accent-soft);border-radius:12px;font-size:13px;line-height:1.5;color:var(--accent-ink)}

    .exercise{display:grid;grid-template-columns:minmax(180px,1fr) minmax(190px,1.05fr);gap:18px;padding:15px 0;border-bottom:1px solid var(--line);align-items:start}
    .exercise:last-child{border-bottom:0}
    .ex-name{font-weight:740;font-size:15px;line-height:1.35}
    .ex-index{display:inline-grid;place-items:center;min-width:20px;height:20px;margin-right:8px;border-radius:6px;background:var(--surface2);color:var(--muted);font-size:12px;font-weight:800}
    .note{margin-top:7px;font-size:12.5px;color:var(--muted);line-height:1.5}
    .note .star{color:var(--accent);font-weight:900;margin-right:3px}
    .sets{display:flex;flex-direction:column;gap:6px}
    .set{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
    .variant+.variant{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
    .variant-label{font-size:10.5px;font-weight:820;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    .load{font-weight:730;font-size:15px}
    .exercise.done .load{color:var(--accent-ink)}
    .rir{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--surface2);padding:1px 7px;border-radius:999px}
    .set .star{color:var(--accent);font-weight:900;font-size:15px}
    .rest{margin-top:9px;font-size:12px;color:var(--muted)}

    .error{padding:18px;border-radius:14px;background:var(--rir-soft);color:var(--rir)}
    .loading{padding:48px;text-align:center;color:var(--muted)}

    .mc-summary{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .mc-summary h2{font-size:16px;font-weight:850;margin:0 0 14px}
    .mc-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
    .mc-metric{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:13px}
    .mc-value{font-size:24px;font-weight:850;letter-spacing:-.02em}
    .mc-name{font-size:13px;font-weight:760;margin-top:2px}
    .mc-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}
    .mc-note b{color:var(--ink);font-weight:760}
    .mc-muscles{margin-top:18px}
    .mc-muscles h3{font-size:13px;font-weight:820;margin:0 0 4px}
    .mc-muscles .sub{font-size:12px;color:var(--muted);margin:0 0 12px}
    .mc-table{display:grid;grid-template-columns:auto 1fr auto auto;gap:9px 12px;align-items:center;font-size:13px}
    .mc-row{display:contents}
    .mc-m{font-weight:720}
    .mc-bar{height:8px;border-radius:999px;background:var(--surface2)}
    .mc-bar span{display:block;height:100%;border-radius:999px}
    .mc-sets{font-weight:800;white-space:nowrap}
    .mc-sets small{font-weight:600;color:var(--muted)}
    .mc-ton{color:var(--muted);white-space:nowrap;text-align:right}
    .mc-incomplete{font-size:12px;color:var(--muted);margin:-6px 0 12px}
    .delta{font-size:12px;font-weight:800;white-space:nowrap}
    .mc-value .delta{font-size:14px;margin-left:8px}
    .delta.up{color:var(--accent-ink)}
    .delta.down{color:#d64545}
    .delta.flat{color:var(--muted)}
    @media(prefers-color-scheme:dark){.delta.down{color:#f28b82}}

    :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
    @media(max-width:720px){
      .shell{padding:18px 12px 48px}
      .workout-toolbar{align-items:stretch;flex-direction:column}
      .session-links{display:grid;grid-template-columns:repeat(4,1fr)}
      .exercise{grid-template-columns:1fr;gap:10px}
      summary{grid-template-columns:auto 1fr}
      .badge{grid-column:2;justify-self:start}
      .mc-table{display:flex;flex-direction:column;gap:14px}
      .mc-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);grid-template-areas:"name name" "bar bar" "sets ton";column-gap:12px;row-gap:6px;align-items:center}
      .mc-row .mc-m{grid-area:name}
      .mc-row .mc-bar{grid-area:bar}
      .mc-row .mc-sets{grid-area:sets;white-space:normal}
      .mc-row .mc-ton{grid-area:ton;white-space:normal;text-align:right}
    }
  </style>
</head>
<body>
  <div id="offline-banner" hidden style="position:fixed;left:0;right:0;bottom:0;z-index:9999;background:var(--rir-soft);color:var(--rir);text-align:center;padding:9px 12px;font-size:13px;font-weight:700;border-top:1px solid color-mix(in srgb,var(--rir) 40%,transparent)">
    Офлайн — показаны сохранённые данные
  </div>
  <main class="shell">
    <div class="controls">
      <div class="mini-bar">
        <a class="back" href="index.html" aria-label="Все программы">←</a>
        <span class="mini-title" id="mini-title">—</span>
        <button class="today" id="mini-today" type="button" aria-label="Открыть текущую тренировку">Сегодня</button>
        <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Меню" aria-expanded="false">☰</button>
      </div>
      <div class="menu-panel" id="menu-panel">
        <div class="topbar">
          <div class="links">
            <a class="back" href="index.html">← Все программы</a>
            <a class="report-link" id="report-link" href="report.html">Прогресс →</a>
          </div>
          <nav class="plan-nav" aria-label="Навигация по планам">
            <button class="nav-button" id="previous-plan" type="button" aria-label="Предыдущий план">←</button>
            <span class="plan-label" id="plan-label">План —</span>
            <button class="nav-button" id="next-plan" type="button" aria-label="Следующий план">→</button>
            <button class="nav-button today-button" id="today-button" type="button" aria-label="Открыть текущую тренировку">Сегодня</button>
          </nav>
        </div>
        <div class="workout-toolbar">
          <div class="mode-switch" aria-label="Режим отображения">
            <button class="tool-button" type="button" data-mode="all">Все</button>
            <button class="tool-button active" type="button" data-mode="single">По одной</button>
          </div>
          <nav class="session-links" id="session-links" aria-label="Быстрый переход к тренировке"></nav>
        </div>
      </div>
    </div>

    <section id="content" class="loading">Загружаю план…</section>
  </main>

  <script>
    (() => {
      "use strict";

      const requestedAthlete = new URLSearchParams(window.location.search).get("athlete");
      const athlete = requestedAthlete === "women" ? "women" : "man";
      const state = { athlete, index: null, plans: [], current: 0, mode: "single", currentSession: 0 };

      const offlineBanner = document.getElementById("offline-banner");
      let servedFromCache = false;
      function updateOfflineBanner() {
        offlineBanner.hidden = navigator.onLine && !servedFromCache;
      }
      window.addEventListener("online", () => { servedFromCache = false; updateOfflineBanner(); });
      window.addEventListener("offline", updateOfflineBanner);
      const $ = id => document.getElementById(id);
      const escapeHtml = value => String(value ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      const number = value => String(value).replace(".", ",");
      const statusLabel = { completed: "Выполнено", current: "Текущая", planned: "Запланировано" };

      function currentGlobalNumber() {
        const id = state.index?.currentSessionId;
        for (const plan of state.plans) {
          const session = plan.sessions.find(item => item.sessionId === id);
          if (session) return session.globalNumber;
        }
        return null;
      }
      function sessionStatus(session) {
        if (session.sessionId === state.index?.currentSessionId) return "current";
        const current = currentGlobalNumber();
        if (current === null || session.globalNumber < current) return "completed";
        return "planned";
      }

      function applyUrlState() {
        const params = new URLSearchParams(window.location.search);
        const planId = params.get("plan");
        const planIndex = state.plans.findIndex(plan => plan.planId === planId);
        if (planIndex >= 0) state.current = planIndex;

        const view = params.get("view");
        state.mode = view === "all" ? "all" : "single";

        const plan = state.plans[state.current];
        const sessionId = params.get("session");
        let sessionIndex = plan.sessions.findIndex(session => session.sessionId === sessionId);
        if (sessionIndex < 0 && state.index?.currentSessionId) {
          sessionIndex = plan.sessions.findIndex(session => session.sessionId === state.index.currentSessionId);
        }
        state.currentSession = sessionIndex >= 0 ? sessionIndex : 0;
      }

      function syncUrl(push = true) {
        const plan = state.plans[state.current];
        if (!plan) return;
        const url = new URL(window.location.href);
        url.searchParams.set("athlete", state.athlete);
        url.searchParams.set("plan", plan.planId);
        url.searchParams.set("view", state.mode);
        url.searchParams.set("session", plan.sessions[state.currentSession].sessionId);
        window.history[push ? "pushState" : "replaceState"]({}, "", url);
      }

      function goToCurrentSession() {
        const currentSessionId = state.index?.currentSessionId;
        if (!currentSessionId) return;
        const planIndex = state.plans.findIndex(plan =>
          plan.sessions.some(session => session.sessionId === currentSessionId));
        if (planIndex < 0) return;
        state.current = planIndex;
        state.currentSession = state.plans[planIndex].sessions
          .findIndex(session => session.sessionId === currentSessionId);
        renderPlan();
        syncUrl();
        scrollToCurrentSession();
        closeMenu();
      }

      function scrollToCurrentSession() {
        if (state.mode !== "all") {
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
        const plan = state.plans[state.current];
        const session = plan?.sessions[state.currentSession];
        if (!session) return;
        document.getElementById(`session-${session.sessionId}`)
          ?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function unitLabel(unit) {
        return unit === "kg_per_hand" ? " кг/рука"
          : unit === "kg_per_side" ? " кг/сторона"
          : unit === "plates" ? " плиток" : " кг";
      }

      function renderSet(block) {
        const load = block.weight === undefined || block.weight === null
          ? `${block.reps} × ${block.sets}`
          : `${number(block.weight)}${unitLabel(block.unit)} × ${block.reps} × ${block.sets}`;
        const rir = block.rir === undefined || block.rir === null ? "" : `<span class="rir">RIR ${block.rir}</span>`;
        const star = block.note ? `<span class="star">*</span>` : "";
        return `<div class="set"><span class="load">${escapeHtml(load)}</span>${rir}${star}</div>`;
      }

      function renderVariant(variant) {
        const blocks = variant.loadBlocks || [];
        const label = variant.label ? `<div class="variant-label">${escapeHtml(variant.label)}</div>` : "";
        const sets = blocks.map(renderSet).join("");
        const blockNotes = blocks.filter(block => block.note)
          .map(block => `<div class="note"><span class="star">*</span>${escapeHtml(block.note)}</div>`).join("");
        const variantNote = variant.note ? `<div class="note">${escapeHtml(variant.note)}</div>` : "";
        return `<div class="variant">${label}<div class="sets">${sets}</div>${variantNote}${blockNotes}</div>`;
      }

      function renderExercise(exercise, index, completed) {
        const variants = (exercise.variants || []).map(renderVariant).join("");
        const exerciseNote = exercise.note ? `<div class="note">${escapeHtml(exercise.note)}</div>` : "";
        const rest = exercise.restSeconds
          ? `<div class="rest">Отдых ${Math.round(exercise.restSeconds / 60 * 10) / 10} мин</div>` : "";
        return `
          <div class="exercise${completed ? " done" : ""}">
            <div>
              <div class="ex-name"><span class="ex-index">${index + 1}</span>${escapeHtml(exercise.name)}</div>
              ${exerciseNote}
            </div>
            <div>
              ${variants}
              ${rest}
            </div>
          </div>`;
      }

      function renderSession(session) {
        const status = sessionStatus(session);
        const completed = status === "completed";
        const interval = session.recommendedIntervalAfterPreviousHours
          ? `через ${session.recommendedIntervalAfterPreviousHours} ч после предыдущей`
          : "первая тренировка плана";
        const note = session.note ? `<div class="session-note">${escapeHtml(session.note)}</div>` : "";
        return `
          <details class="session" id="session-${escapeHtml(session.sessionId)}" open>
            <summary>
              <span class="sequence ${status}">${session.globalNumber}</span>
              <span>
                <span class="session-title">${escapeHtml(session.focus)}</span>
                <span class="session-meta">Тренировка ${session.globalNumber} · ${escapeHtml(session.sessionId)} · ~${session.estimatedDurationMinutes} мин · ${interval}</span>
              </span>
              <span class="badge ${status}">${statusLabel[status] || status}</span>
            </summary>
            <div class="session-body">
              ${note}
              ${(session.workout || []).map((exercise, index) => renderExercise(exercise, index, completed)).join("")}
            </div>
          </details>`;
      }

      const MUSCLE_NORMS = {
        "Грудь": [10, 22], "Спина": [10, 22], "Квадрицепс": [8, 18], "Бицепс бедра": [6, 14],
        "Ягодицы": [4, 16], "Плечи": [8, 22], "Бицепс": [8, 18], "Трицепс": [6, 16],
        "Икры": [8, 16], "Пресс": [6, 20], "Задняя цепь": [4, 12],
      };
      function muscleNorm(muscle) { return MUSCLE_NORMS[muscle] || [10, 20]; }
      function muscleTone(sets, [min, max]) {
        return sets >= min && sets <= max ? "var(--accent)" : "var(--rir)";
      }

      function deltaInfo(current, previous) {
        const change = current - previous;
        const tone = change > 0 ? "up" : change < 0 ? "down" : "flat";
        const sign = change > 0 ? "+" : change < 0 ? "−" : "";
        const pct = previous ? Math.round(Math.abs(change) / previous * 100) : null;
        return { change, tone, sign, pct };
      }
      function metricDelta(current, previous, format = String) {
        if (previous === null || previous === undefined) return "";
        const { change, tone, sign, pct } = deltaInfo(current, previous);
        const num = change === 0 ? "0" : `${sign}${format(Math.abs(change))}`;
        const percent = pct === null ? "" : ` (${change === 0 ? "0%" : `${sign}${pct}%`})`;
        return `<span class="delta ${tone}">${change > 0 ? "▲" : "▼"} ${num}${percent}</span>`;
      }
      function setDelta(current, previous) {
        if (previous === null || previous === undefined) return "";
        const { change, tone, sign } = deltaInfo(current, previous);
        return `<span class="delta ${tone}">${change > 0 ? "▲" : "▼"}${change === 0 ? "0" : `${sign}${Math.abs(change)}`}</span>`;
      }
      function tonnageDelta(current, previous, format) {
        if (previous === null || previous === undefined) return "";
        const { change, tone, sign, pct } = deltaInfo(current, previous);
        const kg = `${change === 0 ? "" : sign}${format(Math.abs(change))} кг`;
        const percent = pct === null ? "" : `, ${change === 0 ? "0" : sign}${pct}%`;
        return `<span class="delta ${tone}"> (${kg}${percent})</span>`;
      }

      function renderMicrocycleSummary(stats, prev, cycle) {
        if (!stats) return "";
        const fmt = value => value.toLocaleString("ru-RU");
        const incomplete = cycle && !cycle.complete
          ? `<p class="mc-incomplete">Цикл ещё идёт: ${cycle.performed} из ${cycle.planned} выполнено, остальное — по плану.</p>`
          : "";
        const muscleRows = Object.keys(stats.hardSetsByMuscle).map(muscle => {
          const sets = stats.hardSetsByMuscle[muscle];
          const tonnage = stats.tonnageByMuscleKg[muscle] || 0;
          const [min, max] = muscleNorm(muscle);
          const width = Math.min(sets / max, 1) * 100;
          const prevSets = prev ? (prev.hardSetsByMuscle[muscle] || 0) : null;
          const prevTon = prev ? (prev.tonnageByMuscleKg[muscle] || 0) : null;
          return `
            <div class="mc-row">
              <div class="mc-m">${escapeHtml(muscle)}</div>
              <div class="mc-bar"><span style="width:${width.toFixed(0)}%;background:${muscleTone(sets, [min, max])}"></span></div>
              <div class="mc-sets">${sets} ${setDelta(sets, prevSets)} <small>/ норма ${min}–${max}</small></div>
              <div class="mc-ton">${fmt(tonnage)} кг${tonnageDelta(tonnage, prevTon, fmt)}</div>
            </div>`;
        }).join("");
        return `
          <section class="mc-summary">
            <h2>Итоги микроцикла</h2>
            ${incomplete}
            <div class="mc-metrics">
              <div class="mc-metric">
                <div class="mc-value">${fmt(stats.tonnageKg)} кг ${metricDelta(stats.tonnageKg, prev?.tonnageKg, fmt)}</div>
                <div class="mc-name">Тоннаж</div>
                <div class="mc-note">Сколько всего поднято за микроцикл: вес × повторы по рабочим подходам (гантели ×2, блок/сторона ×2, плитка ×5 кг, вес тела = 1 кг). <b>Норма:</b> должен расти от цикла к циклу — это и есть прогрессирующая нагрузка.</div>
              </div>
              <div class="mc-metric">
                <div class="mc-value">${stats.avgIntensityPct} % ${metricDelta(stats.avgIntensityPct, prev?.avgIntensityPct)}</div>
                <div class="mc-name">Средняя интенсивность</div>
                <div class="mc-note">Средний рабочий вес относительно расчётного 1ПМ. <b>Норма:</b> 65–75 % — гипертрофия, 80 %+ — сила.</div>
              </div>
              <div class="mc-metric">
                <div class="mc-value">${stats.hardSets} ${metricDelta(stats.hardSets, prev?.hardSets)}</div>
                <div class="mc-name">Рабочих подходов</div>
                <div class="mc-note">Подходы близко к отказу (RIR ≤ 3). <b>Норма:</b> у каждой мышцы своя — большие тянут больше, мелкие меньше (см. таблицу). Микроцикл ≈ неделя.</div>
              </div>
            </div>
            <div class="mc-muscles">
              <h3>По мышцам за микроцикл</h3>
              <p class="sub">Полоса — подходы относительно нормы мышцы; у подходов и тоннажа — дельта к прошлому микроциклу.</p>
              <div class="mc-table">${muscleRows}</div>
            </div>
          </section>`;
      }

      function renderPlan() {
        const plan = state.plans[state.current];
        if (!plan) return;
        if (state.currentSession >= plan.sessions.length) state.currentSession = 0;
        $("plan-label").textContent = `План ${plan.planId}`;
        const activeSession = plan.sessions[state.currentSession];
        $("mini-title").textContent = activeSession ? `${activeSession.focus} · ${activeSession.sessionId}` : "";
        $("previous-plan").disabled = state.current === 0;
        $("next-plan").disabled = state.current === state.plans.length - 1;
        const currentSessionId = state.index?.currentSessionId;
        $("today-button").disabled = !currentSessionId;
        $("mini-today").disabled = !currentSessionId;
        $("session-links").innerHTML = plan.sessions.map((session, index) => {
          const isSelected = index === state.currentSession;
          const status = sessionStatus(session);
          const statusClass = status === "completed" ? "st-done"
            : status === "current" ? "st-current" : "";
          const classes = ["tool-button", statusClass, isSelected ? "selected" : ""].filter(Boolean).join(" ");
          return `
            <button class="${classes}"
              type="button" data-session-index="${index}"
              aria-label="Тренировка ${session.globalNumber}"
              title="${escapeHtml(session.focus)}">№${session.globalNumber}</button>
          `;
        }).join("");
        document.querySelectorAll("[data-mode]").forEach(button => {
          button.classList.toggle("active", button.dataset.mode === state.mode);
        });
        const visibleSessions = state.mode === "single"
          ? [plan.sessions[state.currentSession]]
          : plan.sessions;
        $("content").className = "";
        const performed = plan.sessions.filter(session => session.performedAt).length;
        const planned = plan.schedule?.sessionsPlanned ?? plan.sessions.length;
        const prevStats = state.plans[state.current - 1]?.microcycleStats;
        $("content").innerHTML = `
          <div class="sessions">${visibleSessions.map(renderSession).join("")}</div>
          ${renderMicrocycleSummary(plan.microcycleStats, prevStats, { performed, planned, complete: performed >= planned })}`;
      }

      async function load() {
        try {
          document.title = state.athlete === "women"
            ? "AI-тренер · Женский план"
            : "AI-тренер · Мужской план";
          $("report-link").href = `report.html?athlete=${state.athlete}`;
          servedFromCache = false;
          const indexResponse = await fetch(`log/${state.athlete}/index.json`, { cache: "no-store" });
          if (!indexResponse.ok) throw new Error(`index.json: HTTP ${indexResponse.status}`);
          if (indexResponse.headers.get("X-Offline")) servedFromCache = true;
          state.index = await indexResponse.json();
          const records = state.index.plans;
          state.plans = await Promise.all(records.map(async record => {
            const response = await fetch(`log/${state.athlete}/${record.file}`, { cache: "no-store" });
            if (!response.ok) throw new Error(`${record.file}: HTTP ${response.status}`);
            if (response.headers.get("X-Offline")) servedFromCache = true;
            return response.json();
          }));
          const active = state.plans.findIndex(plan => plan.planId === state.index.activePlanId);
          state.current = active >= 0 ? active : Math.max(0, state.plans.length - 1);
          applyUrlState();
          renderPlan();
          syncUrl(false);
          updateOfflineBanner();
          requestAnimationFrame(scrollToCurrentSession);
        } catch (error) {
          $("content").className = "error";
          $("content").innerHTML = `<b>Не удалось загрузить планы.</b><br>${escapeHtml(error.message)}<br><small>Откройте страницу онлайн хотя бы один раз — дальше она будет работать и без интернета.</small>`;
        }
      }

      function closeMenu() {
        $("menu-panel").classList.remove("open");
        $("menu-toggle").setAttribute("aria-expanded", "false");
      }
      $("menu-toggle").addEventListener("click", () => {
        const open = $("menu-panel").classList.toggle("open");
        $("menu-toggle").setAttribute("aria-expanded", String(open));
      });
      $("previous-plan").addEventListener("click", () => {
        if (state.current > 0) {
          state.current -= 1; state.currentSession = 0; renderPlan();
          syncUrl();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
      $("next-plan").addEventListener("click", () => {
        if (state.current < state.plans.length - 1) {
          state.current += 1; state.currentSession = 0; renderPlan();
          syncUrl();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
      $("today-button").addEventListener("click", goToCurrentSession);
      $("mini-today").addEventListener("click", goToCurrentSession);
      document.querySelector(".mode-switch").addEventListener("click", event => {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        state.mode = button.dataset.mode;
        renderPlan();
        syncUrl();
        scrollToCurrentSession();
      });
      $("session-links").addEventListener("click", event => {
        const button = event.target.closest("[data-session-index]");
        if (!button) return;
        state.currentSession = Number(button.dataset.sessionIndex);
        renderPlan();
        syncUrl();
        scrollToCurrentSession();
        closeMenu();
      });
      window.addEventListener("popstate", () => {
        applyUrlState();
        renderPlan();
        requestAnimationFrame(scrollToCurrentSession);
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
      }

      load();
    })();
  </script>
</body>
</html>
